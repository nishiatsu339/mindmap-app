<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>マインドマップ</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── テーマ変数 ── */
        :root {
            --bg:          #0d1117;
            --surface:     #161b22;
            --surface2:    #21262d;
            --border:      #30363d;
            --text:        #c9d1d9;
            --text-bright: #e6edf3;
            --text-muted:  #484f58;
            --text-muted2: #6e7681;
            --accent:      #1f6feb;
            --accent2:     #388bfd;
            --accent3:     #58a6ff;
            --root-bg:     #0d2137;
            --line-root:   #1f6feb;
            --line-child:  #30363d;
        }

        [data-theme="light"] {
            --bg:          #ffffff;
            --surface:     #f6f8fa;
            --surface2:    #eaeef2;
            --border:      #d0d7de;
            --text:        #24292f;
            --text-bright: #1f2328;
            --text-muted:  #6e7781;
            --text-muted2: #8c959f;
            --accent:      #0969da;
            --accent2:     #218bff;
            --accent3:     #0969da;
            --root-bg:     #dbeafe;
            --line-root:   #0969da;
            --line-child:  #b0b7c0;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background 0.2s;
        }

        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            background: var(--surface);
            border-bottom: 1px solid var(--surface2);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 200;
            transition: background 0.2s, border-color 0.2s;
        }

        #back-btn {
            color: var(--text-muted2);
            text-decoration: none;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 5px;
            transition: color 0.15s, background 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #back-btn:hover { color: var(--text-bright); background: var(--surface2); }

        #topbar-center {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        #map-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
            cursor: pointer;
            border-radius: 4px;
            padding: 3px 10px;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 360px;
        }
        #map-name:hover { background: var(--surface2); }
        #map-name[contenteditable="true"] { background: var(--surface2); cursor: text; box-shadow: 0 0 0 2px var(--accent2); }

        #theme-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-muted2);
            font-size: 15px;
            line-height: 1;
            cursor: pointer;
            padding: 3px 8px;
            flex-shrink: 0;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        #theme-btn:hover { color: var(--text-bright); background: var(--surface2); border-color: var(--text-muted2); }

        #save-status {
            font-size: 12px;
            color: var(--text-muted);
            width: 50px;
            flex-shrink: 0;
            text-align: right;
            font-family: monospace;
        }

        #app {
            width: 100vw;
            height: calc(100vh - 44px);
            margin-top: 44px;
            position: relative;
            overflow: hidden;
        }

        /* Lines drawn in screen space — always visible, never clipped */
        svg#lines {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Zoomable / pannable container for nodes only */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
        }

        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 8px 18px;
            cursor: grab;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.2s;
        }

        .node.root-node {
            background: var(--root-bg);
            border: 2px solid var(--accent);
            cursor: default;
        }

        /* ── ノードカラー（ダーク） ── */
        .node.color-red    { background: #5c1a20; border-color: #f85149; }
        .node.color-blue   { background: #0f2d5c; border-color: #388bfd; }
        .node.color-yellow { background: #4a3c00; border-color: #e3b341; }

        /* ── ノードカラー（ライト） ── */
        [data-theme="light"] .node.color-red    { background: #ffcccc; border-color: #d73a49; }
        [data-theme="light"] .node.color-blue   { background: #ccdeff; border-color: #0969da; }
        [data-theme="light"] .node.color-yellow { background: #fff0a0; border-color: #b08800; }

        .node.selected {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.2),
                        0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .node.editing {
            border-color: var(--accent3);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.25),
                        0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .node.dragging {
            cursor: grabbing !important;
            opacity: 0.88;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            transition: none;
        }

        .node.snap-target {
            border-color: var(--accent3);
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.35),
                        0 0 20px rgba(88, 166, 255, 0.25);
        }

        .node input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            text-align: center;
            cursor: inherit;
            pointer-events: none;
            display: block;
            width: 100%;
            min-width: 60px;
            caret-color: var(--accent3);
        }

        .node.root-node input {
            color: var(--accent3);
            font-weight: 600;
            font-size: 15px;
        }

        .node.selected input,
        .node.editing input {
            pointer-events: auto;
            cursor: text;
        }

        .node.dragging input { pointer-events: none; }

        body.is-dragging,
        body.is-panning  { cursor: grabbing !important; }

        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
        }

        .key {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-width: 2px;
            border-radius: 4px;
            padding: 1px 7px;
            color: var(--text-muted2);
            font-size: 11px;
            font-family: monospace;
        }

        .hint-sep { margin: 0 5px; color: var(--surface2); }

        #zoom-level {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }

        /* ── カラーメニュー ── */
        #color-menu {
            position: fixed;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 400;
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
            user-select: none;
        }

        .color-menu-header {
            font-size: 16px;
            line-height: 1;
            opacity: 0.8;
        }

        .color-swatches {
            display: flex;
            gap: 10px;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
            outline: none;
        }

        .color-swatch:hover {
            transform: scale(1.25);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.25),
                        0 4px 12px rgba(0,0,0,0.4);
        }

        .color-swatch.active {
            box-shadow: 0 0 0 3px #fff, 0 0 0 5px currentColor;
        }
    </style>
</head>
<body>
<div id="topbar">
    <a href="index.html" id="back-btn">← 戻る</a>
    <div id="topbar-center">
        <span id="map-name"></span>
    </div>
    <button id="theme-btn" title="ライト／ダークを切り替え">☀️</button>
    <span id="save-status"></span>
</div>
<div id="app">
    <!-- SVG lives outside #canvas so it's never clipped -->
    <svg id="lines"></svg>
    <div id="canvas"></div>
</div>
<div id="hint">
    <span class="key">Enter</span>&thinsp;兄弟ノード
    <span class="hint-sep">|</span>
    <span class="key">Tab</span>&thinsp;子ノード
    <span class="hint-sep">|</span>
    <span class="key">↑↓←→</span>&thinsp;移動
    <span class="hint-sep">|</span>
    <span class="key">F2</span>&thinsp;編集
    <span class="hint-sep">|</span>
    <span class="key">Del</span>&thinsp;削除
    <span class="hint-sep">|</span>
    <span class="key">Esc</span>&thinsp;元に戻す
    <span class="hint-sep">|</span>
    <span class="key">⇧⌘Z</span>&thinsp;やり直し
    <span class="hint-sep">|</span>
    <span class="key">2本指スワイプ</span>&thinsp;パン
    <span class="hint-sep">|</span>
    <span class="key">ピンチ</span>&thinsp;ズーム
</div>
<div id="zoom-level">100%</div>

<script>
const V_GAP     = 64;
const H_GAP     = 220;
const SNAP_DIST = 90; // この距離（canvas px）以内のノードに吸着

let nodes      = {};
let selected   = null;
let cnt        = 0;
let drag       = null;
let pan        = null;
let view       = { x: 0, y: 0, scale: 1 };
let undoStack  = [];
let redoStack  = [];
const MAX_UNDO = 30;

const app         = document.getElementById('app');
const canvasEl    = document.getElementById('canvas');
const svgEl       = document.getElementById('lines');
const zoomLevelEl = document.getElementById('zoom-level');

// ── Undo ─────────────────────────────────────────────────────────────────────

function currentSnapshot() {
    const snap = { cnt, sel: selected, nodes: {} };
    Object.values(nodes).forEach(n => {
        snap.nodes[n.id] = { ...n, children: [...n.children] };
    });
    return snap;
}

function saveSnapshot() {
    undoStack.push(currentSnapshot());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = []; // 新しい操作でredo履歴を破棄
    scheduleSave();
}

function restoreSnapshot(snap) {
    canvasEl.querySelectorAll('.node').forEach(e => e.remove());
    svgEl.innerHTML = '';
    cnt   = snap.cnt;
    nodes = {};
    Object.values(snap.nodes).forEach(n => {
        nodes[n.id] = { ...n, children: [...n.children] };
    });
    const order = [];
    (function walk(id) { order.push(id); nodes[id].children.forEach(walk); })('root');
    order.forEach(mountNode);
    // スナップショット時に選択されていたノードを復元（消えていればrootへ）
    select(snap.sel && nodes[snap.sel] ? snap.sel : 'root');
    updateLines();
    canvasEl.style.transition = 'opacity 0.1s';
    canvasEl.style.opacity    = '0.5';
    setTimeout(() => { canvasEl.style.opacity = '1'; canvasEl.style.transition = ''; }, 120);
    scheduleSave();
}

function undo() {
    if (!undoStack.length) return;
    redoStack.push(currentSnapshot());
    restoreSnapshot(undoStack.pop());
}

function redo() {
    if (!redoStack.length) return;
    undoStack.push(currentSnapshot());
    restoreSnapshot(redoStack.pop());
}

// ── View helpers ──────────────────────────────────────────────────────────────

function applyView() {
    canvasEl.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.scale})`;
    zoomLevelEl.textContent  = Math.round(view.scale * 100) + '%';
    updateLines(); // lines are in screen space — must redraw on every view change
}

// Canvas → screen coordinates
function c2s(cx, cy) {
    return [cx * view.scale + view.x, cy * view.scale + view.y];
}

// Screen → canvas coordinates
function s2c(sx, sy) {
    return [(sx - view.x) / view.scale, (sy - view.y) / view.scale];
}

// ── Misc helpers ──────────────────────────────────────────────────────────────

function uid()   { return 'n' + (++cnt); }
function el(id)  { return document.getElementById('el-' + id); }
function inp(id) { return el(id)?.querySelector('input'); }

function sizeInput(input) {
    const isRoot = input.closest('.root-node') !== null;
    const ghost  = document.createElement('span');
    ghost.style.cssText    = 'position:absolute;visibility:hidden;white-space:pre;pointer-events:none';
    ghost.style.fontSize   = isRoot ? '15px' : '14px';
    ghost.style.fontFamily = getComputedStyle(document.body).fontFamily;
    ghost.textContent      = input.value || 'あ';
    document.body.appendChild(ghost);
    input.style.width = Math.max(60, ghost.offsetWidth + 8) + 'px';
    ghost.remove();
}

// ── Mount node DOM ────────────────────────────────────────────────────────────

function mountNode(id) {
    const n   = nodes[id];
    const div = document.createElement('div');
    div.id        = 'el-' + id;
    div.className = 'node' + (id === 'root' ? ' root-node' : '');
    div.style.left = n.x + 'px';
    div.style.top  = n.y + 'px';

    const input = document.createElement('input');
    input.type         = 'text';
    input.value        = n.text;
    input.spellcheck   = false;
    input.autocomplete = 'off';
    input.setAttribute('readonly', '');

    input.addEventListener('input', () => {
        n.text = input.value;
        sizeInput(input);
        updateLines();
        scheduleSave();
    });
    input.addEventListener('blur', () => { stopEdit(id); applyLayout(); });

    div.addEventListener('mousedown', e => {
        e.stopPropagation();
        if (e.button !== 0) return; // 左クリックのみドラッグ処理
        const wasSelected = (selected === id);
        if (!wasSelected) select(id);

        if (id !== 'root') {
            const [cx, cy] = s2c(e.clientX, e.clientY);
            drag = { id, ox: cx - n.x, oy: cy - n.y,
                     sx: n.x, sy: n.y, moved: false, wasSelected };
        } else {
            drag = { id: 'root', moved: false, wasSelected };
        }
    });

    // ※ 右クリックはdocument側で一括処理（下の document.addEventListener('contextmenu', ...) を参照）

    // 保存済みの色を反映
    if (n.color) div.classList.add('color-' + n.color);

    div.appendChild(input);
    canvasEl.appendChild(div);
    sizeInput(input);
}

// ── Selection & editing ───────────────────────────────────────────────────────

function select(id) {
    if (selected) {
        el(selected)?.classList.remove('selected');
        stopEdit(selected);
    }
    selected = id;
    if (!id) return;
    el(id)?.classList.add('selected');
    // readonlyのままfocusしておく
    // → 次のキー入力時にmacOSがShift状態を正しく保持し「小文字になる」バグを防ぐ
    inp(id)?.focus();
}

function startEdit(id) {
    const i = inp(id);
    if (!i) return;
    i.removeAttribute('readonly');
    el(id)?.classList.remove('selected');
    el(id)?.classList.add('editing');
    i.focus();
    i.select();
}

function stopEdit(id) {
    const i = inp(id);
    if (!i) return;
    if (i.hasAttribute('readonly')) return; // すでに終了済み（blur再帰防止）
    i.setAttribute('readonly', '');
    const div = el(id);
    if (!div) return;
    div.classList.remove('editing');
    if (selected === id) div.classList.add('selected');
    i.blur(); // フォーカスを離す → 矢印キーがカーソル移動に干渉しない
}

function isEditing(id) { return !(inp(id)?.hasAttribute('readonly')); }

// ── Layout ────────────────────────────────────────────────────────────────────

function subtreeH(id) {
    const n = nodes[id];
    return n.children.length === 0
        ? V_GAP
        : n.children.reduce((s, c) => s + subtreeH(c), 0);
}

function layoutNode(id) {
    const n = nodes[id];
    if (!n.children.length) return;

    const pEl      = el(n.id);
    const pHalfW   = pEl ? pEl.offsetWidth / 2 : 60;
    const MARGIN   = 40; // 親右端 → 子左端の隙間
    const leftEdge = n.x + pHalfW + MARGIN; // 全兄弟の左端を揃える基準

    const heights = n.children.map(subtreeH);
    const total   = heights.reduce((s, h) => s + h, 0);
    let y = n.y - total / 2;

    n.children.forEach((cid, i) => {
        const cEl    = el(cid);
        const cHalfW = cEl ? cEl.offsetWidth / 2 : 60;
        nodes[cid].x = leftEdge + cHalfW; // 左端固定、中心は幅に応じてずれる
        nodes[cid].y = y + heights[i] / 2;
        y += heights[i];
        layoutNode(cid);
    });
}

function applyLayout() {
    layoutNode('root');
    Object.values(nodes).forEach(n => {
        const div = el(n.id);
        if (div) { div.style.left = n.x + 'px'; div.style.top = n.y + 'px'; }
    });
    updateLines();
}

// ── SVG lines (screen coordinates) ───────────────────────────────────────────

function updateLines() {
    svgEl.innerHTML = '';
    Object.values(nodes).forEach(n => {
        if (!n.parentId) return;
        const p   = nodes[n.parentId];
        const pEl = el(p.id);
        const nEl = el(n.id);
        if (!pEl || !nEl) return;

        // Canvas-space endpoints
        const cx1 = p.x + pEl.offsetWidth  / 2;
        const cy1 = p.y;
        const cx2 = n.x - nEl.offsetWidth  / 2;
        const cy2 = n.y;
        const cmx = (cx1 + cx2) / 2;

        // Convert to screen space
        const [x1, y1]   = c2s(cx1, cy1);
        const [x2, y2]   = c2s(cx2, cy2);
        const [cp1x, cp1y] = c2s(cmx, cy1);
        const [cp2x, cp2y] = c2s(cmx, cy2);

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d',              `M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`);
        path.setAttribute('fill',           'none');
        const cs = getComputedStyle(document.documentElement);
        const lineColor = n.parentId === 'root'
            ? cs.getPropertyValue('--line-root').trim()
            : cs.getPropertyValue('--line-child').trim();
        path.setAttribute('stroke', lineColor);
        path.setAttribute('stroke-width',   n.parentId === 'root' ? '2'       : '1.5');
        path.setAttribute('stroke-opacity', '0.75');
        path.setAttribute('stroke-linecap', 'round');
        svgEl.appendChild(path);
    });
}

// ── Add / delete ──────────────────────────────────────────────────────────────

function addTo(parentId, afterSiblingId) {
    saveSnapshot();
    const id     = uid();
    const parent = nodes[parentId];
    nodes[id] = { id, text: '', x: parent.x + H_GAP, y: parent.y, parentId, children: [] };

    if (afterSiblingId !== undefined) {
        const idx = parent.children.indexOf(afterSiblingId);
        parent.children.splice(idx + 1, 0, id);
    } else {
        parent.children.push(id);
    }

    mountNode(id);
    applyLayout();
    select(id);
    startEdit(id);
}

function addSibling(id) {
    if (!nodes[id].parentId) addTo('root');
    else                     addTo(nodes[id].parentId, id);
}

function addChild(id) { addTo(id); }

function deleteNode(id) {
    if (id === 'root') return;
    saveSnapshot();
    const n      = nodes[id];
    const parent = nodes[n.parentId];
    const idx    = parent.children.indexOf(id);
    parent.children.splice(idx, 1);

    (function purge(nid) {
        nodes[nid].children.forEach(purge);
        el(nid)?.remove();
        delete nodes[nid];
    })(id);

    applyLayout();
    const nextId = parent.children[Math.max(0, idx - 1)] ?? n.parentId;
    if (nodes[nextId]) select(nextId);
}

// ── Re-parent helpers ─────────────────────────────────────────────────────────

function getDescendants(id) {
    const set = new Set();
    (function walk(nid) {
        nodes[nid].children.forEach(c => { set.add(c); walk(c); });
    })(id);
    return set;
}

function findSnapTarget(dragId) {
    const dragged  = nodes[dragId];
    const excluded = new Set([dragId, ...getDescendants(dragId)]);
    let nearest = null, minDist = SNAP_DIST;
    Object.values(nodes).forEach(n => {
        if (excluded.has(n.id)) return;
        const d = Math.hypot(n.x - dragged.x, n.y - dragged.y);
        if (d < minDist) { minDist = d; nearest = n.id; }
    });
    return nearest;
}

function drawDragLine() {
    svgEl.querySelectorAll('.drag-line').forEach(p => p.remove());
    if (!drag?.moved || !drag.snapTarget) return;
    const src = nodes[drag.snapTarget];
    const dst = nodes[drag.id];
    const srcEl = el(drag.snapTarget);
    const dstEl = el(drag.id);
    if (!src || !dst || !srcEl || !dstEl) return;

    const [x1, y1] = c2s(src.x + srcEl.offsetWidth / 2, src.y);
    const [x2, y2] = c2s(dst.x - dstEl.offsetWidth / 2, dst.y);
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d',              `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill',          'none');
    path.setAttribute('stroke',        getComputedStyle(document.documentElement).getPropertyValue('--accent3').trim());
    path.setAttribute('stroke-width',  '2');
    path.setAttribute('stroke-dasharray', '7,4');
    path.setAttribute('stroke-opacity', '0.9');
    path.setAttribute('class',         'drag-line');
    svgEl.appendChild(path);
}

function clearSnapTarget() {
    if (drag?.snapTarget) {
        el(drag.snapTarget)?.classList.remove('snap-target');
        drag.snapTarget = null;
    }
    svgEl.querySelectorAll('.drag-line').forEach(p => p.remove());
}

// ── Drag node ─────────────────────────────────────────────────────────────────

function moveSubtree(id, dx, dy) {
    const n = nodes[id];
    n.x += dx; n.y += dy;
    const div = el(id);
    if (div) { div.style.left = n.x + 'px'; div.style.top = n.y + 'px'; }
    n.children.forEach(cid => moveSubtree(cid, dx, dy));
}

// ── Global mouse events ───────────────────────────────────────────────────────

document.addEventListener('mousemove', e => {
    if (pan) {
        view.x = pan.sx + (e.clientX - pan.mx);
        view.y = pan.sy + (e.clientY - pan.my);
        applyView();
    }

    if (!drag || drag.id === 'root') return;
    const [cx, cy] = s2c(e.clientX, e.clientY);
    const newX = cx - drag.ox;
    const newY = cy - drag.oy;

    if (!drag.moved) {
        if (Math.hypot(newX - drag.sx, newY - drag.sy) < 5) return;
        drag.moved = true;
        el(drag.id)?.classList.add('dragging');
        document.body.classList.add('is-dragging');
    }

    const n = nodes[drag.id];
    moveSubtree(drag.id, newX - n.x, newY - n.y);
    updateLines();

    // スナップターゲット検出
    const nearest = findSnapTarget(drag.id);
    if (nearest !== drag.snapTarget) {
        if (drag.snapTarget) el(drag.snapTarget)?.classList.remove('snap-target');
        drag.snapTarget = nearest;
        if (drag.snapTarget) el(drag.snapTarget)?.classList.add('snap-target');
    }
    drawDragLine();
});

document.addEventListener('mouseup', () => {
    pan = null;
    document.body.classList.remove('is-panning');

    if (!drag) return;
    const { id, moved, wasSelected, snapTarget } = drag;
    clearSnapTarget();
    drag = null;
    el(id)?.classList.remove('dragging');
    document.body.classList.remove('is-dragging');

    if (!moved && wasSelected && !isEditing(id)) {
        startEdit(id);
        return;
    }

    // 別ノードにスナップ → 親子関係を変更
    if (moved && snapTarget && snapTarget !== nodes[id]?.parentId) {
        saveSnapshot();
        const oldParentId = nodes[id].parentId;
        if (oldParentId) {
            const op = nodes[oldParentId];
            op.children.splice(op.children.indexOf(id), 1);
        }
        nodes[id].parentId = snapTarget;
        nodes[snapTarget].children.push(id);
        applyLayout();
    }
});

// ── Wheel: 2-finger scroll = pan, pinch (ctrlKey) = zoom ─────────────────────

app.addEventListener('wheel', e => {
    e.preventDefault();

    if (e.ctrlKey || e.metaKey) {
        // Pinch to zoom (trackpad) or Ctrl/Cmd + scroll (mouse)
        const raw      = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
        const factor   = Math.exp(-raw * 0.01);
        const newScale = Math.min(4, Math.max(0.1, view.scale * factor));
        const rect     = app.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        view.x     = mx - (mx - view.x) * (newScale / view.scale);
        view.y     = my - (my - view.y) * (newScale / view.scale);
        view.scale = newScale;
    } else {
        // 2-finger scroll = pan
        view.x -= e.deltaX;
        view.y -= e.deltaY;
    }

    applyView();
}, { passive: false });

// ── Background drag = pan (mouse users) ──────────────────────────────────────

app.addEventListener('mousedown', e => {
    if (e.target === app || e.target === canvasEl || e.target === svgEl) {
        select(null);
        pan = { mx: e.clientX, my: e.clientY, sx: view.x, sy: view.y };
        document.body.classList.add('is-panning');
    }
});

// ── Keyboard ──────────────────────────────────────────────────────────────────

function handleKey(e, id) {
    if (isEditing(id)) {
        // e.isComposing=true の間はIME変換中 → Enter/Tab でノード操作しない
        if      (e.key === 'Enter'  && !e.isComposing) { e.preventDefault(); stopEdit(id); addSibling(id); }
        else if (e.key === 'Tab'    && !e.isComposing) { e.preventDefault(); stopEdit(id); addChild(id);   }
        else if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); stopEdit(id); inp(id)?.focus(); }
        else if ((e.key === 'Backspace' || e.key === 'Delete') && nodes[id].text === '' && id !== 'root') {
            e.preventDefault(); stopEdit(id); deleteNode(id);
        }
        return;
    }

    const n = nodes[id];
    switch (e.key) {
        case 'Enter':
            if (e.isComposing) break;
            e.preventDefault(); addSibling(id); break;
        case 'Tab':       e.preventDefault(); addChild(id);   break;
        case 'F2':        e.preventDefault(); startEdit(id);  break;
        case 'Delete':
        case 'Backspace': e.preventDefault(); deleteNode(id); break;

        case 'ArrowUp': {
            e.preventDefault();
            if (n.parentId) {
                const sibs = nodes[n.parentId].children;
                const i = sibs.indexOf(id);
                select(i > 0 ? sibs[i - 1] : n.parentId);
            }
            break;
        }
        case 'ArrowDown': {
            e.preventDefault();
            if (n.parentId) {
                const sibs = nodes[n.parentId].children;
                const i = sibs.indexOf(id);
                if (i < sibs.length - 1) select(sibs[i + 1]);
            } else if (n.children.length) {
                select(n.children[0]);
            }
            break;
        }
        case 'ArrowRight':
            e.preventDefault();
            if (n.children.length) select(n.children[0]);
            break;
        case 'ArrowLeft':
            e.preventDefault();
            if (n.parentId) select(n.parentId);
            break;

        default:
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                const i = inp(id);
                if (i) {
                    // select()でfocus済みのためe.keyはShift状態を正しく含む
                    const char = e.key;
                    e.preventDefault();
                    i.removeAttribute('readonly');
                    el(id)?.classList.remove('selected');
                    el(id)?.classList.add('editing');
                    i.value = char;
                    n.text  = char;
                    sizeInput(i);
                    i.setSelectionRange(char.length, char.length);
                    // i.focus()不要 — select()で既にfocus済み
                }
            }
    }
}

// ── Right-click → color menu (document-level, avoids pointer-events issues) ──

document.addEventListener('contextmenu', e => {
    // クリックされた要素からもっとも近い .node を探す（root 以外）
    const nodeEl = e.target.closest('.node:not(.root-node)');
    if (!nodeEl) return; // canvas背景や root なら何もしない
    e.preventDefault();
    const nodeId = nodeEl.id.replace('el-', '');
    showColorMenu(nodeId, e.clientX, e.clientY);
});

// ── Color menu ────────────────────────────────────────────────────────────────

let colorMenuEl  = null;
let colorOverlay = null;

const COLOR_DEFS = [
    { id: 'red',    label: '赤', fill: '#f85149' },
    { id: 'blue',   label: '青', fill: '#388bfd' },
    { id: 'yellow', label: '黄', fill: '#e3b341' },
];

function showColorMenu(id, x, y) {
    closeColorMenu();

    // 透明オーバーレイ：外側クリックで確実に閉じる
    colorOverlay = document.createElement('div');
    colorOverlay.style.cssText = 'position:fixed;inset:0;z-index:399;';
    colorOverlay.addEventListener('pointerdown', closeColorMenu);
    colorOverlay.addEventListener('contextmenu', e => { e.preventDefault(); closeColorMenu(); });
    document.body.appendChild(colorOverlay);

    // メニュー本体
    colorMenuEl = document.createElement('div');
    colorMenuEl.id = 'color-menu'; // z-index:400

    const header = document.createElement('div');
    header.className = 'color-menu-header';
    header.textContent = '🖌️';

    const swatches = document.createElement('div');
    swatches.className = 'color-swatches';

    COLOR_DEFS.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'color-swatch' + (nodes[id]?.color === c.id ? ' active' : '');
        btn.title     = c.label;
        btn.style.background = c.fill;
        btn.addEventListener('pointerdown', e => e.stopPropagation()); // オーバーレイに届かせない
        btn.addEventListener('click', () => { setNodeColor(id, c.id); closeColorMenu(); });
        swatches.appendChild(btn);
    });

    colorMenuEl.appendChild(header);
    colorMenuEl.appendChild(swatches);
    document.body.appendChild(colorMenuEl);

    // 位置調整（画面端からはみ出さないように）
    const mw = 130, mh = 90;
    colorMenuEl.style.left = Math.min(x, window.innerWidth  - mw - 10) + 'px';
    colorMenuEl.style.top  = (y + mh > window.innerHeight ? y - mh - 5 : y + 5) + 'px';
}

function closeColorMenu() {
    if (colorMenuEl)  { colorMenuEl.remove();  colorMenuEl  = null; }
    if (colorOverlay) { colorOverlay.remove(); colorOverlay = null; }
}

function setNodeColor(id, color) {
    saveSnapshot();
    nodes[id].color = color;
    const div = el(id);
    if (div) {
        div.classList.remove('color-red', 'color-blue', 'color-yellow');
        div.classList.add('color-' + color);
    }
    scheduleSave();
}

// ── Global keyboard handler ───────────────────────────────────────────────────
// キーイベントをすべてここで一元管理する（inputのフォーカス状態に依存しない）

document.addEventListener('keydown', e => {
    // マップ名など contenteditable 要素への入力は無視
    if (e.target.contentEditable === 'true') return;

    const editing = !!document.querySelector('.node.editing');

    // Escape: カラーメニューを閉じる → 非編集時は元に戻す
    if (e.key === 'Escape') {
        if (colorMenuEl) { closeColorMenu(); return; }
        if (!editing) { e.preventDefault(); undo(); return; }
    }
    // Cmd/Ctrl+Z: 元に戻す
    if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
        e.preventDefault(); undo(); return;
    }
    // Cmd/Ctrl+Shift+Z: やり直し
    if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey) && e.shiftKey) {
        e.preventDefault(); redo(); return;
    }
    // PgUp: 拡大 / PgDn: 縮小
    if (e.key === 'PageUp' || e.key === 'PageDown') {
        e.preventDefault();
        const factor  = e.key === 'PageUp' ? 1.25 : 1 / 1.25;
        const newScale = Math.min(4, Math.max(0.1, view.scale * factor));
        // 画面中心を基準にズーム
        const cx = app.clientWidth  / 2;
        const cy = app.clientHeight / 2;
        view.x = cx - (cx - view.x) * (newScale / view.scale);
        view.y = cy - (cy - view.y) * (newScale / view.scale);
        view.scale = newScale;
        applyView();
        return;
    }

    // 選択ノードへキーを転送（編集中か否かは handleKey 内で判断）
    if (selected) {
        handleKey(e, selected);
    }
});

// ── Persistence ───────────────────────────────────────────────────────────────

const mapId = new URLSearchParams(location.search).get('id');
if (!mapId) location.replace('index.html');

let mapName   = '無題のマップ';
let saveTimer = null;

function scheduleSave() {
    if (!mapId) return;
    clearTimeout(saveTimer);
    const ss = document.getElementById('save-status');
    if (ss) ss.textContent = '...';
    saveTimer = setTimeout(persistMap, 600);
}

function persistMap() {
    if (!mapId) return;
    const data = { name: mapName, cnt, nodes: {} };
    Object.values(nodes).forEach(n => {
        data.nodes[n.id] = { ...n, children: [...n.children] };
    });
    localStorage.setItem('mindmap_data_' + mapId, JSON.stringify(data));
    try {
        const list = JSON.parse(localStorage.getItem('mindmap_list') || '[]');
        const entry = list.find(m => m.id === mapId);
        if (entry) { entry.name = mapName; entry.updatedAt = new Date().toISOString(); }
        localStorage.setItem('mindmap_list', JSON.stringify(list));
    } catch {}
    const ss = document.getElementById('save-status');
    if (ss) { ss.textContent = '✓'; setTimeout(() => { if (ss) ss.textContent = ''; }, 1500); }
}

// ── Init ──────────────────────────────────────────────────────────────────────

window.addEventListener('resize', applyLayout);

const W     = window.innerWidth;
const H     = window.innerHeight;
const saved = (() => {
    try { return mapId ? JSON.parse(localStorage.getItem('mindmap_data_' + mapId)) : null; } catch { return null; }
})();

if (saved?.nodes?.root) {
    mapName = saved.name || '無題のマップ';
    cnt     = saved.cnt  || 0;
    Object.values(saved.nodes).forEach(n => {
        nodes[n.id] = { ...n, children: [...n.children] };
    });
    const order = [];
    (function walk(id) { order.push(id); nodes[id].children.forEach(walk); })('root');
    order.forEach(mountNode);
} else {
    nodes['root'] = {
        id: 'root', text: 'メインテーマ',
        x: Math.round(W * 0.2), y: Math.round(H / 2),
        parentId: null, children: []
    };
    mountNode('root');
}

const mapNameEl = document.getElementById('map-name');
if (mapNameEl) {
    mapNameEl.textContent = mapName;
    mapNameEl.addEventListener('click', () => {
        if (mapNameEl.contentEditable === 'true') return;
        mapNameEl.contentEditable = 'true';
        mapNameEl.focus();
        const range = document.createRange();
        range.selectNodeContents(mapNameEl);
        getSelection().removeAllRanges();
        getSelection().addRange(range);
    });
    mapNameEl.addEventListener('blur', () => {
        mapNameEl.contentEditable = 'false';
        const newName = mapNameEl.textContent.trim() || '無題のマップ';
        mapName = newName;
        mapNameEl.textContent = mapName;
        scheduleSave();
    });
    mapNameEl.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); mapNameEl.blur(); }
        if (e.key === 'Escape') { e.stopPropagation(); mapNameEl.contentEditable = 'false'; mapNameEl.textContent = mapName; }
    });
}

// ── Theme ─────────────────────────────────────────────────────────────────────

function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
    updateLines();
}

function toggleTheme() {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    applyTheme(next);
    localStorage.setItem('mindmap_theme', next);
}

document.getElementById('theme-btn')?.addEventListener('click', toggleTheme);
applyTheme(localStorage.getItem('mindmap_theme') || 'dark');

select('root');
applyView();
</script>
</body>
